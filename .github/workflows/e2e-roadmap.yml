name: E2E - Roadmap Isolation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  roadmap-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
      SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      E2E_BASE_URL: http://localhost:8080

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser (Chromium)
        run: bunx playwright install --with-deps chromium

      - name: Start dev server
        run: |
          nohup bun run dev > dev-server.log 2>&1 &
          echo $! > dev.pid
          for i in {1..60}; do
            if curl -sf http://localhost:8080 > /dev/null; then
              echo "dev server up"; exit 0
            fi
            sleep 2
          done
          echo "dev server failed to start"; tail -n 200 dev-server.log; exit 1

      - name: Run roadmap isolation + access E2E tests
        run: bun run test:e2e:roadmap

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-results/
            playwright-report/
            dev-server.log
          if-no-files-found: ignore
